<!DOCTYPE html>
<html lang="pt-pt">
    <head>
        <title>Game News</title>
        <meta name="description" content="Exercicios de JavaScript,CSS, E HTML">
        <meta charset="UTF-8">
    <meta name="author" content="Reinaldo Espindola Souza">
    <meta name="keywords" content="JavaScript CSS HTML WEB PROGRAMAÇÃO">

    <meta name="robots" content="noindex">
    
    <link rel="stylesheet" href="styles.css">

    <body>
        <!-- Coloque logo no início do <body> -->
        <div id="progressBar"></div>

        <div class="divSlogan" id="firstMessage">
            <span id="firstSentence" class="slogan"></span>
        </div>
        <div class="divSlogan" id="secondMessage">
            <span id="secondSentence" class="slogan"></span>
        </div>
        <div class="divSlogan" id="thirdMessage">
            <span id="thirdSentence" class="slogan"></span>
        </div>
        <div class="divSlogan" id="fourthMessage">
            <span id="fourthSentence" class="slogan"></span>
        </div>
        

        <!-- Contentor principal do Mosaico -->
<div class="mosaico-container">
    
    <!-- Texto chamativo que vai ficar por cima -->
    <h2 id="mensagemFinal" class="texto-mosaico"></h2>
    
    <!-- O Mosaico com as 4 fotos -->
    <div class="mosaicoImagens">
        <img src="images/Alexandre1.jpeg" alt="Jogo 1">

        <img src="images/Alexandre2.jpeg" alt="Jogo 2">

        <img src="images/Alexandre3.jpeg" alt="Jogo 3">
        
        <img src="images/Alexandre4.jpeg" alt="Jogo 4">
    </div>

</div>
